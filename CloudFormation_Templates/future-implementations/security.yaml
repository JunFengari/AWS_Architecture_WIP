# Insuffiecient LabRole permissions for Cloudfront.
# cloudfront-waf.yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront + WAF protection stack for Kasvihuone frontend and API

Resources:
    # WAF Web ACL
    KasvihuoneWebACL:
        Type: AWS::WAFv2::WebACL
        Properties:
            Name: KasvihuoneWebACL
            Scope: CLOUDFRONT
            DefaultAction:
                Allow: {}
            VisibilityConfig:
                SampledRequestsEnabled: true
                CloudWatchMetricsEnabled: true
                MetricName: KasvihuoneWebACL
            Rules:
                # Very low rate limit for testing
                - Name: RateLimitRule
                  Priority: 0
                  Statement:
                      RateBasedStatement:
                          Limit: 50
                          AggregateKeyType: IP
                  Action:
                      Block: {}
                  VisibilityConfig:
                      SampledRequestsEnabled: true
                      CloudWatchMetricsEnabled: true
                      MetricName: RateLimitRule

                # AWS managed common protections
                - Name: AWSManagedCommonRuleSet
                  Priority: 1
                  OverrideAction:
                      None: {}
                  Statement:
                      ManagedRuleGroupStatement:
                          VendorName: AWS
                          Name: AWSManagedRulesCommonRuleSet
                  VisibilityConfig:
                      SampledRequestsEnabled: true
                      CloudWatchMetricsEnabled: true
                      MetricName: AWSManagedCommonRuleSet

    # CloudFront Distribution
    KasvihuoneDistribution:
        Type: AWS::CloudFront::Distribution
        Properties:
            DistributionConfig:
                Enabled: true
                Comment: CloudFront for Kasvihuone frontend and API
                DefaultRootObject: index.html

                Origins:
                    # S3 website origin
                    - Id: S3Origin
                      DomainName: kasvihuone-frontend-demo.s3-website-us-east-1.amazonaws.com
                      CustomOriginConfig:
                          HTTPPort: 80
                          HTTPSPort: 443
                          OriginProtocolPolicy: http-only

                    # API Gateway origin
                    - Id: ApiOrigin
                      DomainName: 5qtbtl4fqb.execute-api.us-east-1.amazonaws.com
                      OriginPath: /prod
                      CustomOriginConfig:
                          HTTPPort: 80
                          HTTPSPort: 443
                          OriginProtocolPolicy: https-only

                DefaultCacheBehavior:
                    TargetOriginId: S3Origin
                    ViewerProtocolPolicy: redirect-to-https
                    AllowedMethods:
                        - GET
                        - HEAD
                    CachedMethods:
                        - GET
                        - HEAD
                    ForwardedValues:
                        QueryString: false
                        Cookies:
                            Forward: none

                CacheBehaviors:
                    - PathPattern: api/*
                      TargetOriginId: ApiOrigin
                      ViewerProtocolPolicy: redirect-to-https
                      AllowedMethods:
                          - GET
                          - HEAD
                          - OPTIONS
                          - PUT
                          - POST
                          - PATCH
                          - DELETE
                      CachedMethods:
                          - GET
                          - HEAD
                      ForwardedValues:
                          QueryString: true
                          Headers:
                              - Authorization
                              - Content-Type
                          Cookies:
                              Forward: all
                      MinTTL: 0
                      DefaultTTL: 0
                      MaxTTL: 0

                WebACLId: !GetAtt KasvihuoneWebACL.Arn

                ViewerCertificate:
                    CloudFrontDefaultCertificate: true

Outputs:
    CloudFrontURL:
        Description: CloudFront distribution URL
        Value: !Sub 'https://${KasvihuoneDistribution.DomainName}'

    FrontendURL:
        Description: Frontend URL through CloudFront
        Value: !Sub 'https://${KasvihuoneDistribution.DomainName}'

    ApiURL:
        Description: API URL through CloudFront
        Value: !Sub 'https://${KasvihuoneDistribution.DomainName}/api/write'
